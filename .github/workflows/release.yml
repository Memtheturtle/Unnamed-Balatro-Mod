name: Build mod zip and release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create mod zip
        run: |
          cd ..
          zip -r "UnnamedBalatroMod-${GITHUB_REF_NAME}.zip" "Unnamed Balatro Mod" \
            -x "Unnamed Balatro Mod/.git/*" "Unnamed Balatro Mod/.github/*"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: "UnnamedBalatroMod-${GITHUB_REF_NAME}.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

